<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Core Web Vitals Performance Optimizations: Font Preconnections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Default metadata; route-specific builds replace these values. -->
    <meta name="description" content="Convert plus-size clothing sizes across leading fashion brands using bust, waist, and hip measurements, then explore curated brand fit notes and size charts." />
    <meta name="robots" content="index,follow" />
    
    <!-- Canonical URL Configuration -->
    <link rel="canonical" href="https://www.curvyand.com/" />

    <!-- Fallback Open Graph & Social Metadata -->
    <meta property="og:title" content="Plus-Size Brand Size Converter & Fit Directory | Curvy&" />
    <meta property="og:description" content="Convert plus-size clothing sizes across leading fashion brands using bust, waist, and hip measurements, then explore curated brand fit notes and size charts." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.curvyand.com/" />
    <meta property="og:image" content="https://www.curvyand.com/curvy-brand-icon.png" />
    <meta property="og:site_name" content="Curvy&" />

    <!-- Twitter Card Metadata -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Plus-Size Brand Size Converter & Fit Directory | Curvy&" />
    <meta name="twitter:description" content="Convert plus-size clothing sizes using your measurements and compare curated brand fit notes." />
    <meta name="twitter:image" content="https://www.curvyand.com/curvy-brand-icon.png" />

    <!-- Stable, crawlable root-level favicon URLs for browsers and Google Search. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Plus-Size Brand Size Converter &amp; Fit Directory | Curvy&amp;</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

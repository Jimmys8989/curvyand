<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Core Web Vitals Performance Optimizations: Font Preconnections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Default Meta Description for Google SERP -->
    <meta name="description" content="Discover your perfect fit across top plus-size clothing brands. Use our precision size converter and explore a community-verified database of over 50 plus-size luxury and fashion brands." />
    
    <!-- Canonical URL Configuration -->
    <link rel="canonical" href="https://www.curvyand.com/" />

    <!-- Fallback Open Graph & Social Metadata -->
    <meta property="og:title" content="Curvy& | Premium Plus-Size Luxury Brand Size Converter" />
    <meta property="og:description" content="Discover your perfect fit across top plus-size clothing brands. Use our precision size converter and explore a community-verified database of over 50 plus-size luxury and fashion brands." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.curvyand.com/" />
    <meta property="og:image" content="https://www.curvyand.com/curvy-brand-icon.png" />
    <meta property="og:site_name" content="Curvy&" />

    <!-- Twitter Card Metadata -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Curvy& | Premium Plus-Size Size Converter" />
    <meta name="twitter:description" content="Precision plus-size size converter tool and community-backed database for sizing accuracy." />
    <meta name="twitter:image" content="https://www.curvyand.com/curvy-brand-icon.png" />

    <!-- Stable, crawlable root-level favicon URLs for browsers and Google Search. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Curvy&amp; | Premium Plus-Size Luxury Brand Size Converter</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
